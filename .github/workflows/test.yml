name: Entropic v2 Tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install system deps
        run: brew install portaudio
      - name: Install backend deps
        run: cd backend && pip install -e ".[dev]"
      - name: Run backend smoke tests
        run: cd backend && python -m pytest tests/ -m smoke --tb=short -q
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Run frontend unit tests
        run: cd frontend && npx vitest run

  sidecar:
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install system deps
        run: brew install portaudio ffmpeg
      - name: Install backend deps
        run: cd backend && pip install -e ".[dev]"
      - name: Run sidecar tests
        run: cd backend && python -m pytest tests/ -v --tb=short -m "not perf" -p no:timeout

  electron-e2e:
    # PR gate — smoke.spec only. Byte-identical behavior to the pre-shard job
    # for pull requests: single runner, no matrix, no impact on concurrent
    # sessions' PR CI cadence. The main-push full suite moved to
    # electron-e2e-full below (job-level main-only condition).
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install system deps
        run: brew install portaudio
      - name: Install backend deps
        run: cd backend && pip install -e ".[dev]"
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Install Playwright
        run: cd frontend && npx playwright install
      - name: Generate test fixtures
        run: bash scripts/generate-test-fixtures.sh
      - name: Build Electron app
        run: cd frontend && npx electron-vite build
      - name: Run smoke test
        run: cd frontend && npx playwright test tests/e2e/smoke.spec.ts
      - name: Cleanup orphan processes
        if: always()
        run: pkill -f "backend/src/main.py" || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: frontend/test-results/

  electron-e2e-full:
    # Full suite, main pushes ONLY, sharded 1/4 so the ~170-test serial
    # Electron suite fits CI (was timing out at globalTimeout 600s with only
    # ~37 tests executing — silent sampling). Job-level condition means PRs
    # spawn ZERO extra runners.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install system deps
        run: brew install portaudio
      - name: Install backend deps
        run: cd backend && pip install -e ".[dev]"
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Install Playwright
        run: cd frontend && npx playwright install
      - name: Generate test fixtures
        run: bash scripts/generate-test-fixtures.sh
      - name: Build Electron app
        run: cd frontend && npx electron-vite build
      - name: Run full E2E tests (shard ${{ matrix.shard }}/4)
        run: cd frontend && npx playwright test tests/e2e/ --shard=${{ matrix.shard }}/4
        env:
          CI: '1'
      - name: Cleanup orphan processes
        if: always()
        run: pkill -f "backend/src/main.py" || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-full-shard-${{ matrix.shard }}
          path: frontend/test-results/

  test-health-comment:
    runs-on: macos-latest
    needs: [smoke, electron-e2e]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Post test health comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Test Health',
              '| Layer | Status | Notes |',
              '|-------|--------|-------|',
              '| Backend smoke | Passed | pytest -m smoke |',
              '| Vitest (unit + component + contract) | Passed | ~415 tests, ~2s |',
              '| E2E smoke | Passed | Playwright + real Electron |',
              '| Full E2E | Merge to main only | ~15 tests |',
              '',
              '*Pyramid: 80% unit / 15% component / 5% E2E*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('### Test Health') && c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
